<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Application</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.development.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect } = React;
        
        function App() {
            const [restaurants, setRestaurants] = useState([]);
            const [menus, setMenus] = useState([]);
            const [orders, setOrders] = useState([]);
            const [selectedRestaurant, setSelectedRestaurant] = useState(null);
            const [selectedMenu, setSelectedMenu] = useState(null);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            useEffect(() => {
                fetch('/restaurants')
                    .then(response => response.json())
                    .then(data => setRestaurants(data))
                    .catch(error => setError(error));
            }, []);
            
            const handleRestaurantSelect = (restaurant) => {
                setSelectedRestaurant(restaurant);
                fetch(`/restaurants/${restaurant.id}/menus`)
                    .then(response => response.json())
                    .then(data => setMenus(data))
                    .catch(error => setError(error));
            }
            
            const handleMenuSelect = (menu) => {
                setSelectedMenu(menu);
                fetch(`/menus/${menu.id}/items`)
                    .then(response => response.json())
                    .then(data => console.log(data))
                    .catch(error => setError(error));
            }
            
            const handleOrderCreate = () => {
                setLoading(true);
                fetch('/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_name: 'John Doe',
                        customer_address: '123 Main St',
                        customer_phone_number: '123-456-7890',
                        order_date: new Date().toISOString(),
                        total: 0
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        setOrders([...orders, data]);
                        setLoading(false);
                    })
                    .catch(error => {
                        setError(error);
                        setLoading(false);
                    });
            }
            
            const handleOrderItemAdd = (order, item) => {
                setLoading(true);
                fetch(`/orders/${order.id}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        menu_item_id: item.id,
                        quantity: 1
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        setOrders(orders.map((o) => o.id === order.id ? { ...o, items: [...o.items, data] } : o));
                        setLoading(false);
                    })
                    .catch(error => {
                        setError(error);
                        setLoading(false);
                    });
            }
            
            const handlePayment = (order) => {
                setLoading(true);
                fetch(`/orders/${order.id}/payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        payment_method: 'Credit Card',
                        payment_date: new Date().toISOString(),
                        amount: order.total
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        setOrders(orders.map((o) => o.id === order.id ? { ...o, payment: data } : o));
                        setLoading(false);
                    })
                    .catch(error => {
                        setError(error);
                        setLoading(false);
                    });
            }
            
            if (loading) {
                return <div>Loading...</div>;
            }
            
            if (error) {
                return <div>Error: {error.message}</div>;
            }
            
            return (
                <div className="container mx-auto p-4">
                    <h1 className="text-3xl font-bold mb-4">Food Delivery Application</h1>
                    <div className="flex flex-wrap -mx-4">
                        <div className="w-full md:w-1/2 xl:w-1/3 p-4">
                            <h2 className="text-2xl font-bold mb-4">Restaurants</h2>
                            <ul>
                                {restaurants.map((restaurant) => (
                                    <li key={restaurant.id} onClick={() => handleRestaurantSelect(restaurant)}>
                                        {restaurant.name}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="w-full md:w-1/2 xl:w-1/3 p-4">
                            <h2 className="text-2xl font-bold mb-4">Menus</h2>
                            <ul>
                                {menus.map((menu) => (
                                    <li key={menu.id} onClick={() => handleMenuSelect(menu)}>
                                        {menu.name}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="w-full md:w-1/2 xl:w-1/3 p-4">
                            <h2 className="text-2xl font-bold mb-4">Orders</h2>
                            <ul>
                                {orders.map((order) => (
                                    <li key={order.id}>
                                        {order.customer_name} - {order.total}
                                        <button onClick={() => handleOrderItemAdd(order, selectedMenu)}>
                                            Add Item
                                        </button>
                                        <button onClick={() => handlePayment(order)}>
                                            Pay
                                        </button>
                                    </li>
                                ))}
                            </ul>
                            <button onClick={handleOrderCreate}>
                                Create Order
                            </button>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
